<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Rah Hil Khan Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Libre Caslon Text',serif;
    color:#fff;
    background:#000;
}

/* ===== LOADER (SUBTLE) ===== */
#loader{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#d4af37;
    z-index:9999;
}
.glitch{
    position:relative;
    font-size:28px;
}
.glitch::before,.glitch::after{
    content:"EDITRHK";
    position:absolute;
    left:0;
    opacity:.6;
}
.glitch::before{color:red;animation:g1 2s infinite;}
.glitch::after{color:blue;animation:g2 2s infinite;}
@keyframes g1{50%{transform:translate(-1px,1px);}}
@keyframes g2{50%{transform:translate(1px,-1px);}}

/* ===== HEADER ===== */
.header{
    position:fixed;
    top:0;
    width:100%;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    backdrop-filter:blur(15px);
    background:rgba(0,0,0,0.6);
    border-bottom:1px solid rgba(212,175,55,0.2);
    z-index:1000;
    transition:.3s;
}

/* PROFILE ALIGN FIX */
.profile-box{
    display:flex;
    align-items:center;
    gap:15px;
}
.profile-box img{
    width:60px;
    height:60px;
    border-radius:50%;
    border:2px solid #d4af37;
}
.profile-text{
    display:flex;
    flex-direction:column;
    justify-content:center;
}
.profile-text h1{
    font-size:20px;
    line-height:1.2;
}
.profile-text p{
    font-size:11px;
    color:#bbb;
    margin-top:4px;
}

/* ===== TABS ===== */
.tabs{
    display:flex;
    gap:15px;
}
.tab{
    padding:6px 14px;
    border:1px solid rgba(212,175,55,0.4);
    border-radius:20px;
    font-size:12px;
    cursor:pointer;
}
.tab.active,.tab:hover{
    background:#d4af37;
    color:#000;
}

/* ===== WORK ===== */
.work{
    padding:130px 8% 60px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:40px;
}

/* reels mode */
.work.reels-mode{
    grid-template-columns:repeat(4,1fr);
}
.work.reels-mode iframe{
    aspect-ratio:9/16;
}

/* ===== CARD HOVER ===== */
.card{
    border-radius:20px;
    overflow:hidden;
    transition:.4s ease;
}
.card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 10px 40px rgba(212,175,55,0.25);
}

/* ===== VIDEO ===== */
.video-wrap{
    position:relative;
    cursor:pointer;
}
.video-wrap iframe{
    width:100%;
    aspect-ratio:16/9;
    border:none;
}

/* ===== OVERLAY ===== */
.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18px;
    opacity:0;
    transform:translateY(10px);
    transition:.35s ease;
}
.video-wrap:hover .overlay{
    opacity:1;
    transform:translateY(0);
}

/* ===== MODAL ===== */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
}
.modal-content{
    max-width:800px;
    width:90%;
}
.modal iframe{
    width:100%;
    aspect-ratio:16/9;
}

/* ===== FOOTER ===== */
.footer{
    padding:60px;
    text-align:center;
    color:#ccc;
}

/* MOBILE */
@media(max-width:900px){
    .work{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="glitch">EDITRHK</div>
</div>

<!-- HEADER -->
<div class="header">

    <div class="profile-box">
        <img src="image1.png">
        <div class="profile-text">
            <h1>Rah Hil Khan</h1>
            <p>Content Creator • AI Specialist • Video Editor</p>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-filter="all">All</div>
        <div class="tab" data-filter="reels">Reels</div>
        <div class="tab" data-filter="commercials">Commercials</div>
        <div class="tab" data-filter="events">Events</div>
        <div class="tab" data-filter="ai">AI Videos</div>
    </div>

</div>

<!-- WORK -->
<section class="work" id="work">

<!-- VIDEOS (UNCHANGED) -->
<div class="card" data-category="events" data-title="Event Film" data-desc="Cinematic wedding/event storytelling.">
<div class="video-wrap">
<iframe src="https://www.youtube.com/embed/dKnHwncJd8w"></iframe>
<div class="overlay">Event Film</div>
</div>
</div>

<div class="card" data-category="commercials">
<div class="video-wrap">
<iframe src="https://www.youtube.com/embed/xtP1h6M-BhE"></iframe>
<div class="overlay">Commercial</div>
</div>
</div>

<div class="card" data-category="ai">
<div class="video-wrap">
<iframe src="https://www.youtube.com/embed/RQ4hMpByvW8"></iframe>
<div class="overlay">AI Film</div>
</div>
</div>

<div class="card" data-category="reels">
<div class="video-wrap">
<iframe src="https://www.youtube.com/embed/xLkA5XFgEtE"></iframe>
<div class="overlay">Reel</div>
</div>
</div>

<div class="card" data-category="events">
<div class="video-wrap">
<iframe src="https://www.youtube.com/embed/IhEfeBIoBrk"></iframe>
<div class="overlay">Event</div>
</div>
</div>

<div class="card" data-category="commercials">
<div class="video-wrap">
<iframe src="https://www.youtube.com/embed/6KqZWw7Z1D4"></iframe>
<div class="overlay">Ad Film</div>
</div>
</div>

<div class="card" data-category="ai">
<div class="video-wrap">
<iframe src="https://www.youtube.com/embed/9i0ju0_MxlU"></iframe>
<div class="overlay">AI Visual</div>
</div>
</div>

<div class="card" data-category="reels">
<div class="video-wrap">
<iframe src="https://www.youtube.com/embed/3ij7H_F44N4"></iframe>
<div class="overlay">Reel</div>
</div>
</div>

<div class="card" data-category="events">
<div class="video-wrap">
<iframe src="https://www.youtube.com/embed/hpizmJJ_ZX0"></iframe>
<div class="overlay">Event</div>
</div>
</div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <iframe id="modalVideo"></iframe>
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
    </div>
</div>

<footer class="footer">
<b>Contact</b><br><br>
Email : professionalrhk@gmail.com  |  Instagram : @edit.rhk
</footer>

<script>

/* LOADER */
window.onload=()=>document.getElementById("loader").style.display="none";

/* FILTER + REELS MODE */
const tabs=document.querySelectorAll(".tab");
const cards=document.querySelectorAll(".card");
const work=document.getElementById("work");

tabs.forEach(tab=>{
    tab.onclick=()=>{
        tabs.forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");

        let f=tab.dataset.filter;

        work.classList.toggle("reels-mode", f==="reels");

        cards.forEach(c=>{
            c.style.display=(f==="all"||c.dataset.category===f)?"block":"none";
        });
    };
});

/* MODAL */
const modal=document.getElementById("modal");
const modalVideo=document.getElementById("modalVideo");

document.querySelectorAll(".video-wrap").forEach(w=>{
    w.onclick=()=>{
        modal.style.display="flex";
        modalVideo.src=w.querySelector("iframe").src+"?autoplay=1";
    };
});

modal.onclick=()=>{
    modal.style.display="none";
    modalVideo.src="";
};

/* HEADER SHRINK */
const header=document.querySelector(".header");
window.addEventListener("scroll",()=>{
    header.style.padding=window.scrollY>50?"10px 30px":"15px 40px";
});

</script>

</body>
</html>
