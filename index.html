<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Rah Hil Khan Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
html{scroll-behavior:smooth;}
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Libre Caslon Text',serif;
    color:black;
    overflow-x:hidden;
}

/* ===== LOADING SCREEN ===== */
#loader{
    position:fixed;
    inset:0;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    z-index:9999;
    letter-spacing:3px;
}

/* ===== BACKGROUND ===== */
body::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:-2;

    background:linear-gradient(
        45deg,
        #bfa98f,
        #8f7f6a,
        #9ca9b5,
        #6e5f4d
    );

    background-size:400% 400%;
    animation:gradient 120s ease infinite;
}

@keyframes gradient{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* ===== GLASS ===== */
.glass{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(25px);
    border-radius:30px;
    border:1px solid rgba(212,175,55,0.35);
    box-shadow:0 30px 80px rgba(0,0,0,0.25);
}

/* ===== HERO ===== */
.hero-wrap{
    display:flex;
    justify-content:center;
    padding:140px 20px 80px;
    perspective:1000px;
}

.hero{
    text-align:center;
    padding:60px;
    max-width:900px;
}

.profile{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
}

h1{font-size:42px;margin-top:25px;}
p{margin-top:18px;line-height:1.7;}

/* ===== WORK ===== */
.work-title{
    text-align:center;
    font-size:30px;
    margin:40px 0;
}

.work{
    padding:80px 8%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:40px;
}

/* ===== TABS ===== */
.tabs{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:40px;
}

.tab{
    padding:10px 25px;
    border-radius:30px;
    cursor:pointer;
    border:1px solid rgba(0,0,0,0.2);
    background:rgba(255,255,255,0.2);
    transition:.3s;
}

.tab.active{
    background:black;
    color:white;
}

.tab-content{display:none;}
.tab-content.active{display:grid;}

/* ===== CARDS ===== */
.card{
    overflow:hidden;
    border-radius:20px;
}

.card iframe{
    width:100%;
    aspect-ratio:16/9;
    border:none;
}

.reel iframe{
    aspect-ratio:9/16;
}

.card:hover{
    transform:translateY(-10px);
}

/* ===== FOOTER ===== */
.footer{
    margin-top:100px;
    padding:60px;
    text-align:center;
}

/* ===== MOBILE ===== */
@media(max-width:900px){
    .work{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div id="loader">EDITRHK</div>

<!-- HERO -->
<div class="hero-wrap">
<div class="hero glass">

<img src="image1.png" class="profile">

<h1>Rah Hil Khan</h1>
<p>
Content Creator • AI Specialist • Video Editor<br><br>
Cinematic storytelling for weddings, events,
brands and AI-powered visuals worldwide.
</p>

</div>
</div>

<h2 class="work-title">MY WORK</h2>

<!-- TABS -->
<div class="tabs">
    <div class="tab active" onclick="showTab('all', this)">All</div>
    <div class="tab" onclick="showTab('reels', this)">Reels</div>
    <div class="tab" onclick="showTab('ai', this)">AI Videos</div>
</div>

<!-- ALL -->
<section class="work tab-content active" id="all">

<div class="card glass"><iframe src="https://www.youtube.com/embed/dKnHwncJd8w"></iframe></div>
<div class="card glass"><iframe src="https://www.youtube.com/embed/xtP1h6M-BhE"></iframe></div>
<div class="card glass"><iframe src="https://www.youtube.com/embed/RQ4hMpByvW8"></iframe></div>
<div class="card glass"><iframe src="https://www.youtube.com/embed/xLkA5XFgEtE"></iframe></div>
<div class="card glass"><iframe src="https://www.youtube.com/embed/IhEfeBIoBrk"></iframe></div>
<div class="card glass"><iframe src="https://www.youtube.com/embed/6KqZWw7Z1D4"></iframe></div>

</section>

<!-- REELS -->
<section class="work tab-content" id="reels">

<div class="card glass reel">
<iframe src="https://www.youtube.com/embed/YOUR_SHORT_ID"></iframe>
</div>

<div class="card glass reel">
<iframe src="https://www.youtube.com/embed/YOUR_SHORT_ID2"></iframe>
</div>

</section>

<!-- AI VIDEOS -->
<section class="work tab-content" id="ai">

<div class="card glass">
<iframe src="https://www.youtube.com/embed/YOUR_AI_VIDEO"></iframe>
</div>

<div class="card glass">
<iframe src="https://www.youtube.com/embed/YOUR_AI_VIDEO2"></iframe>
</div>

</section>

<footer class="footer glass">
<b>Contact</b><br><br>
Email : professionalrhk@gmail.com  |  Instagram : @edit.rhk
</footer>

<script>

/* LOADER */
window.onload=()=>setTimeout(()=>{
    document.getElementById("loader").style.display="none";
},1200);

/* TAB SWITCH */
function showTab(id, el){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");

    document.querySelectorAll(".tab-content").forEach(c=>{
        c.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
